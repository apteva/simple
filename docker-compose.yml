# Local stack: apteva-server + apteva-simple. Run with:
#   docker compose up --build
# Then open http://localhost:8088 and log in with a user from the server.
services:
  apteva-server:
    image: 46.224.26.45:5000/agent-core:latest
    # Swap the image above with your own server build if you run it
    # locally. The compose file is agnostic about how you get it.
    environment:
      - APTEVA_DATA_DIR=/data
    volumes:
      - apteva-data:/data
    expose:
      - "8080"

  apteva-simple:
    build: .
    environment:
      - APTEVA_SERVER_URL=http://apteva-server:8080
    ports:
      - "8088:80"
    depends_on:
      - apteva-server

volumes:
  apteva-data:
