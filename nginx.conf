server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy /api to the apteva-server. APTEVA_SERVER_URL is injected at
    # container start via envsubst (see docker-entrypoint.sh). Defaults
    # to `http://apteva-server:8080` which matches the orchestrator's
    # service name on the same network.
    location /api/ {
        proxy_pass ${APTEVA_SERVER_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookie forwarded bidirectionally (same origin to the
        # browser via this proxy).
        proxy_pass_header Set-Cookie;

        # SSE must stream immediately. Disable all buffering layers.
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
        proxy_set_header Connection "";
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Cache static bundle assets aggressively — bundler hashes filenames
    # so cache invalidation is content-addressed.
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unmatched path serves index.html so client-side
    # routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
